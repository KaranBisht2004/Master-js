<body>
    <h1 id="heading" onclick="changeHeading()">Hello I am learning events in JavaScript</h1>

    <div id="grandP"
        style="height: 300px; width: 300px; background-color: crimson; display: flex; justify-content: center; align-items: center; border-radius: 100%;">

        <div id="perant"
            style="height: 200px; width: 200px; background-color: rgba(146, 255, 100, 0.695); display: flex; justify-content: center; align-items: center; border-radius: 100%;">

            <div id="child"
                style="height: 100px; width: 100px; background-color: rgb(169, 70, 255); display: flex; justify-content: center; align-items: center;border-radius: 100%;">
            </div>
        </div>

    <script>

        let heading = document.getElementById("heading");


        heading.addEventListener("click", () => {
            if (heading.textContent === 'Hello I am learning events in JavaScript') {
                heading.textContent = "I changed this heading using addEventListener";
            } else {
                heading.textContent = 'Hello I am learning events in JavaScript';
            }
        });


        //  2. THE BIG CONCEPT: EVENT BUBBLING
        // Jab ek element kisi doosre element ke andar hota hai, aur hum andar wale (child) ko click karte hain,
        // toh event automatic bahar wale (parents) par bhi trigger hota hai—jaise paani me se gubbara upar aata hai.

        const grandP = document.getElementById("grandP");
        grandP.addEventListener("click", () => {
            console.log("grandP is clicked");
        });

        const perant = document.getElementById("perant");
        perant.addEventListener("click", () => {
            console.log("perant is clicked");
        });

        const child = document.getElementById("child");
        child.addEventListener("click", (event) => { // 'event' object ko pass kiya
            console.log(event.timeStamp);
            console.log("child is clicked");

            //  Bubbling ko ROKNA kaise hai?
            // "Mujhe sirf child click chahiye, baki parent click nahi hone chahiye!"
            // Toh tum use karoge: event.stopPropagation()
            event.stopPropagation(); 
        });

        // 1. Bubbling Flow: Target Element ➔ Parent ➔ GrandParent ➔ Body ➔ Document (Niche se Upar)
        // 2. Stop Bubbling: `e.stopPropagation()` lagane se event upar baki ke parents ke paas nahi jata.
