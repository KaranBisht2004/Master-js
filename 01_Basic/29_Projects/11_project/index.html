<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic User Finder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">

        <img class="avatar" id="avatarIcon" src="https://api.dicebear.com/7.x/initials/svg?seed=User" alt="avatar">
        <h1 id="userName">User Name</h1>
        <p class="email" id="userEmail">user@example.com</p>
        <p class="company" id="userCompany">Company Name</p>

        <button id="btn">Next User ➡️</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
