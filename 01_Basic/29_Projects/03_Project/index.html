<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A playful love compatibility calculator.">
    <title>Love Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Love+Ya+Like+A+Sister&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
 
<body>
 
    <div id="mainDIV">
        <h1>Love Calculator</h1>
        <p class="subtitle">Enter two names and see what fate says ✨</p>
 
        <div id="inputDIV">
            <div class="input-group">
                <label for="name1">Your Name</label>
                <input id="yourname" type="text" placeholder="e.g. Karan" autocomplete="off" maxlength="30" required>
            </div>
 
 
            <div class="input-group">
                <label for="name2">Their Name</label>
               <input id="theirName" type="text" placeholder="e.g. Aditi" autocomplete="off" maxlength="30" required>
            </div>
        </div>
 
        <button id="calculator" type="button">
            Calculate Love
        </button>
 
        <div id="resultSection">
            <p class="result-label">Your Score</p>
            <div class="meter-track">
                <div id="meterFill"></div>
            </div>
            <h3 id="yourScore">--%</h3>
        </div>
    </div>
 
    <script src="script.js"></script>
</body>
 
</html>
