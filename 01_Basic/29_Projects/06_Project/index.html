<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astrology Insight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Prata&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background"></div>

    <main class="container">
        <div class="card">

            <div class="header">
                <h1>Astrology Insight</h1>
                <p>Enter your details to receive your personalized astrology insight.</p>
            </div>

            <form id="astrologyForm">

                <div class="input-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required />
                </div>

                <div class="input-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required />
                </div>

                <div class="dob-grid">

                    <div class="input-group">
                        <label for="day">Day</label>
                        <input type="number" id="day" name="day" min="1" max="31" placeholder="DD" required />
                    </div>

                    <div class="input-group">
                        <label for="month">Month</label>
                        <select id="month" name="month" required>
                            <option value="">Month</option>
                            <option>January</option>
                            <option>February</option>
                            <option>March</option>
                            <option>April</option>
                            <option>May</option>
                            <option>June</option>
                            <option>July</option>
                            <option>August</option>
                            <option>September</option>
                            <option>October</option>
                            <option>November</option>
                            <option>December</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="year">Year</label>
                        <input type="number" id="year" name="year" min="1900" max="2100" placeholder="YYYY" required />
                    </div>

                </div>

                <button id="submitBTN" type="submit">
                    Get Astrology Insight
                </button>

            </form>

            <div id="result">
                <p id="results"></p>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
