<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus on Today</title>
    <link rel="stylesheet" href="style.css">

    <!-- Stable Font Awesome v6 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <div id="div">
        <h1 id="heading">Focus on <span>Today</span></h1>

        <div id="mainDIV">

            <p id="divHeading">Today <i class="fa-solid fa-sun"></i></p>

            <p id="raiseHeading">Raise the bar by completing your goals!</p>

            <!-- Progress Bar -->
            <div id="ProgressBar">
                <div id="progressFill"></div>
            </div>

            <p id="errorText">Please set all the 3 goals!</p>

            <form id="goalsForm">
                
                <!-- Goal 1 -->
                <div class="inputDiv">
                    <input type="checkbox" id="goal1" class="goal-checkbox">
                    <label for="goal1" class="custom-circle" title="Mark as complete"></label>
                    <input type="text" class="goal-text" placeholder="Add new goal..." maxlength="60">
                </div>

                <!-- Goal 2 -->
                <div class="inputDiv">
                    <input type="checkbox" id="goal2" class="goal-checkbox">
                    <label for="goal2" class="custom-circle" title="Mark as complete"></label>
                    <input type="text" class="goal-text" placeholder="Add new goal..." maxlength="60">
                </div>

                <!-- Goal 3 -->
                <div class="inputDiv">
                    <input type="checkbox" id="goal3" class="goal-checkbox">
                    <label for="goal3" class="custom-circle" title="Mark as complete"></label>
                    <input type="text" class="goal-text" placeholder="Add new goal..." maxlength="60">
                </div>
            </form>

            <!-- Quote & Credit -->
            <div id="footerQuote">
                <p id="quoteText">"Move one step ahead, today!"</p>
                <p id="creditText">Made with <i class="fa-solid fa-heart"></i> by Karan Bisht</p>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
